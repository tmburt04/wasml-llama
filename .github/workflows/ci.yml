name: wasml-llama

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: ci-${{ github.run_number }}
  WASML_QWEN_MODEL_URL: ${{ vars.WASML_QWEN_MODEL_URL || 'https://huggingface.co/lmstudio-community/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf?download=1' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  build-webgpu:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v15
      - uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          install-dependencies: true
      - run: npm ci
      - id: sync
        run: |
          RESULT_FILE="$RUNNER_TEMP/sync-result.json"
          node ci/scripts/sync-upstream.mjs > "$RESULT_FILE"
          echo "upstream-commit<<EOF" >> "$GITHUB_OUTPUT"
          node --input-type=module -e \
            "import { readFileSync } from 'node:fs'; const r = JSON.parse(readFileSync(process.argv[1], 'utf8')); process.stdout.write(r.upstreamCommit);" \
            "$RESULT_FILE" >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - env:
          UPSTREAM_COMMIT: ${{ steps.sync.outputs.upstream-commit }}
        run: npm run wasm:build:webgpu -- --version "${RELEASE_VERSION}-webgpu" --upstream-commit "$UPSTREAM_COMMIT"
      - env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}-webgpu
        run: node ci/scripts/check-abi.mjs
      - env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}-webgpu
        run: node ci/scripts/check-release.mjs
      - run: npm run typecheck
      - id: webgpu-preflight
        if: ${{ vars.WASML_ENABLE_WEBGPU_BENCH == 'true' }}
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npx tsx bench/src/webgpu-availability.ts
      - if: ${{ vars.WASML_ENABLE_WEBGPU_BENCH == 'true' && steps.webgpu-preflight.outputs.available != 'true' }}
        run: |
          echo "Skipping WebGPU benchmark: ${{ steps.webgpu-preflight.outputs.reason }}"
      - if: ${{ vars.WASML_ENABLE_WEBGPU_BENCH == 'true' && steps.webgpu-preflight.outputs.available == 'true' }}
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run bench:browser -- --commit "${RELEASE_VERSION}-webgpu" --version "${RELEASE_VERSION}-webgpu" --backend webgpu --model-url "$WASML_QWEN_MODEL_URL" --chrome "$CHROME_BIN"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: wasml-llama-webgpu-${{ github.run_number }}
          path: wasm-build/dist/${{ env.RELEASE_VERSION }}-webgpu
      - uses: actions/upload-artifact@v6
        if: ${{ always() && vars.WASML_ENABLE_WEBGPU_BENCH == 'true' && steps.webgpu-preflight.outputs.available == 'true' }}
        with:
          name: wasml-llama-webgpu-bench-${{ github.run_number }}
          path: bench/results/${{ env.RELEASE_VERSION }}-webgpu.json
