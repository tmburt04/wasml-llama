name: wasml-llama

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  RELEASE_VERSION: ci-${{ github.run_number }}
  WASML_QWEN_MODEL_URL: ${{ vars.WASML_QWEN_MODEL_URL || 'https://huggingface.co/lmstudio-community/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf?download=1' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    outputs:
      sync-result: ${{ steps.sync.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: sync
        run: |
          RESULT=$(node ci/scripts/sync-upstream.mjs)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  open-sync-pr:
    if: github.event_name == 'schedule' && fromJSON(needs.quality.outputs.sync-result).updated
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node ci/scripts/sync-upstream.mjs
      - name: Create sync branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_RESULT: ${{ needs.quality.outputs.sync-result }}
        run: |
          COMMIT=$(echo "$SYNC_RESULT" | jq -r '.upstreamCommit')
          CHANGELOG=$(echo "$SYNC_RESULT" | jq -r '.changelog')
          SHORT=$(echo "$COMMIT" | head -c 10)
          BRANCH="upstream-sync/${SHORT}"
          git checkout -b "$BRANCH"
          git add upstream-sync/vendor
          git commit -m "chore: sync llama.cpp upstream to ${SHORT}" || exit 0
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: sync llama.cpp upstream to ${SHORT}" \
            --body "$(cat <<EOF
          ## Upstream sync

          Updated llama.cpp vendor to \`${COMMIT}\`.

          ### Changelog
          \`\`\`
          ${CHANGELOG}
          \`\`\`
          EOF
          )"

  build-cpu:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
      - run: npm ci
      - run: node ci/scripts/sync-upstream.mjs
      - run: npm run wasm:build:cpu -- --version "${RELEASE_VERSION}-cpu" --upstream-commit "$(git -C upstream-sync/vendor/llama.cpp rev-parse HEAD)"
      - env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}-cpu
        run: node ci/scripts/check-release.mjs
      - run: npm run typecheck
      - run: npm run bench:node -- --commit "${RELEASE_VERSION}-cpu" --version "${RELEASE_VERSION}-cpu" --backend cpu --model-url "$WASML_QWEN_MODEL_URL"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasml-llama-cpu-${{ github.run_number }}
          path: |
            wasm-build/dist/${{ env.RELEASE_VERSION }}-cpu
            bench/results/${{ env.RELEASE_VERSION }}-cpu.json

  build-webgpu:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - run: npm ci
      - run: node ci/scripts/sync-upstream.mjs
      - run: npm run wasm:build:webgpu -- --version "${RELEASE_VERSION}-webgpu" --upstream-commit "$(git -C upstream-sync/vendor/llama.cpp rev-parse HEAD)"
      - env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}-webgpu
        run: node ci/scripts/check-release.mjs
      - run: npm run typecheck
      - if: ${{ vars.WASML_ENABLE_WEBGPU_BENCH == 'true' }}
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run bench:browser -- --commit "${RELEASE_VERSION}-webgpu" --version "${RELEASE_VERSION}-webgpu" --backend webgpu --model-url "$WASML_QWEN_MODEL_URL" --chrome "$CHROME_BIN"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasml-llama-webgpu-${{ github.run_number }}
          path: |
            wasm-build/dist/${{ env.RELEASE_VERSION }}-webgpu
            bench/results/${{ env.RELEASE_VERSION }}-webgpu.json
